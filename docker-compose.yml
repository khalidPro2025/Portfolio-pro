services:
  mongodb:
    image: mongo:7
    container_name: portfolio-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - portfolio-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: portfolio-api
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/portfolio
      - PORT=5000
      - CORS_ORIGIN=https://securite
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - portfolio-net

  frontend:
    build: ./frontend
    container_name: portfolio-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - portfolio-net

volumes:
  mongo_data:

networks:
  portfolio-net:
    driver: bridge
